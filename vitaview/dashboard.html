  "Third-party tested for purity and potency - GMP certified facility",

// Generate SP-API format items for a category
function generateCategoryItems(cat, count) {
  const items = [];
  const shuffled = [...ALL_BRANDS].sort(() => Math.random() - 0.5);
  for (let i = 0; i < count; i++) {
    const brand = shuffled[i % shuffled.length];
    const formula = FORMULAS[i % FORMULAS.length];
    const sizes = ['60', '90', '120', '180', '240'];
    const size = sizes[Math.floor(Math.random() * sizes.length)];
    const price = +(8 + Math.random() * 52).toFixed(2);
    const rank = 50 + Math.floor(Math.random() * 80000);
    items.push({
      asin: `B0${cat.id.toUpperCase().slice(0,3)}${String(i).padStart(5,'0')}`,
      summaries: [{ itemName: `${brand} ${cat.name} ${formula} - ${size} Count` }],
      attributes: {
        brand: [{ value: brand }],
        list_price: [{ value: { amount: String(price) } }],
        bullet_point: BULLET_POINTS.map(b => ({ value: b })),
      },
      salesRanks: [{ ranks: [{ rank }] }],
      images: [{ images: [{ link: `https://placehold.co/300x300/1e293b/6ee7b7?text=${encodeURIComponent(cat.icon)}` }] }],
    });
  }
  return items;
}

// Demo data generator for trends
function generateDemoData() {
  const categories = {};
  CATEGORIES.forEach((cat, ci) => {
    const items = generateCategoryItems(cat, 15);
    const prices = items.map(p => parseFloat(p.attributes.list_price[0].value.amount));
    const ranks = items.map(p => p.salesRanks[0].ranks[0].rank);
    const brandData = {};
    items.forEach(p => {
      const brand = p.attributes.brand[0].value;
      const pr = parseFloat(p.attributes.list_price[0].value.amount);
      if (!brandData[brand]) brandData[brand] = { count: 0, revenue: 0 };
      brandData[brand].count += 1;
      brandData[brand].revenue += pr;
    });
    categories[cat.id] = {
      totalProducts: 50 + Math.floor(Math.random() * 200),
      itemCount: items.length,
      avgPrice: +(prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(2),
      minPrice: +Math.min(...prices).toFixed(2),
      maxPrice: +Math.max(...prices).toFixed(2),
      avgRank: Math.round(ranks.reduce((a, b) => a + b, 0) / ranks.length),
      brands: brandData,
      topProducts: items.map(p => ({
        asin: p.asin,
        title: p.summaries[0].itemName,
        brand: p.attributes.brand[0].value,
        price: parseFloat(p.attributes.list_price[0].value.amount),
        rank: p.salesRanks[0].ranks[0].rank,
        image: p.images[0].images[0].link,
      })).sort((a, b) => a.rank - b.rank).slice(0, 100),
      priceDistribution: {
        under10: prices.filter(p => p < 10).length,
        '10to20': prices.filter(p => p >= 10 && p < 20).length,
        '20to30': prices.filter(p => p >= 20 && p < 30).length,
        '30to50': prices.filter(p => p >= 30 && p < 50).length,
        over50: prices.filter(p => p >= 50).length,
      }
    };
  });
  return { categories, timestamp: new Date().toISOString() };
}

const FORM_PATTERNS = [
  { form: "Gummy", pattern: /gumm(y|ies)/i },
  { form: "Capsule", pattern: /capsule/i },
  { form: "Softgel", pattern: /soft\s?gel/i },

  { form: "Powder", pattern: /powder/i },
  { form: "Liquid", pattern: /liquid|drops?|tincture|syrup/i },
  { form: "Chewable", pattern: /chewable/i },
  { form: "Lozenge", pattern: /lozenge/i },
  { form: "Spray", pattern: /spray/i },
  { form: "Patch", pattern: /patch/i },
  { form: "Oil", pattern: /\boil\b/i },
  { form: "Cream", pattern: /cream|topical|ointment/i },
];

function extractForm(title) {
  if (!title) return "Other";
  for (const { form, pattern } of FORM_PATTERNS) {
    if (pattern.test(title)) return form;
  }
  return "Capsule"; // default assumption for supplements
}

// Key ingredient extraction from title
const INGREDIENT_PATTERNS = [
  /vitamin\s?[a-k]\d*/i, /omega[\s-]?\d/i, /magnesium/i, /zinc/i, /iron/i, /calcium/i,
  /biotin/i, /collagen/i, /turmeric|curcumin/i, /probiotics?/i, /ashwagandha/i,
  /melatonin/i, /creatine/i, /protein/i, /fiber/i, /elderberry/i, /coq10/i,
  /glucosamine/i, /berberine/i, /lion'?s?\s?mane/i, /reishi/i, /cordyceps/i,
  /peptide/i, /colostrum/i, /hyaluronic/i, /keratin/i, /msm/i, /nmn/i, /nad\+?/i,
  /sea\s?moss/i, /shilajit/i, /tongkat\s?ali/i, /maca/i, /ginseng/i,
];

function extractIngredients(title) {
  if (!title) return [];
  const found = [];
  for (const pattern of INGREDIENT_PATTERNS) {
    const match = title.match(pattern);
    if (match) found.push(match[0]);
  }
  return found;
}

function CategoryLoadingSpinner() {
  const [idx, setIdx] = useState(0);
  const [fade, setFade] = useState(true);
  useEffect(() => {
    const t = setInterval(() => {
      setFade(false);
      setTimeout(() => {
        setIdx(i => (i + 1) % CATEGORIES.length);
        setFade(true);
      }, 200);
    }, 800);
    return () => clearInterval(t);
  }, []);
  const cat = CATEGORIES[idx];
  return (
    <div style={{ textAlign: "center", padding: 60 }}>
      <div style={{ fontSize: 64, marginBottom: 12, transition: "opacity 0.2s ease, transform 0.3s ease", opacity: fade ? 1 : 0, transform: fade ? "scale(1) translateY(0)" : "scale(0.7) translateY(10px)" }}>{cat?.icon}</div>

      </div>
    </div>
  );
}

      const data = await r.json();
      setSearchResults(data.items || []);
    } catch (e) {
      // Demo search: find matching items across categories
      const q = searchQuery.toLowerCase();
      const matched = [];
      CATEGORIES.forEach(cat => {
        if (!demoBrowseCache[cat.id]) demoBrowseCache[cat.id] = generateCategoryItems(cat, 20);
        demoBrowseCache[cat.id].forEach(item => {
          const title = item.summaries[0].itemName.toLowerCase();
          const brand = item.attributes.brand[0].value.toLowerCase();
          if (title.includes(q) || brand.includes(q) || cat.name.toLowerCase().includes(q)) {
            matched.push(item);
          }
        });
      });
      setSearchResults(matched.slice(0, 20));
    }
    setLoading(false);
  };

  const formatPrice = (attrs) => {
    const lp = attrs?.list_price?.[0];
    const price = (typeof lp?.value === 'number' ? lp.value : lp?.value?.amount) || attrs?.price?.[0]?.value;
    return price ? `$${parseFloat(price).toFixed(2)}` : "N/A";
  };
  const getBrand = (attrs) => attrs?.brand?.[0]?.value || "Unknown Brand";
  const getTitle = (summaries) => summaries?.[0]?.itemName || "Unknown Product";
  const getRank = (salesRanks) => {
    const sr = salesRanks?.[0];
    return sr?.classificationRanks?.[0]?.rank || sr?.displayGroupRanks?.[0]?.rank || sr?.ranks?.[0]?.rank || null;
  };
  const getImage = (images) => images?.[0]?.images?.[0]?.link || null;

  // Estimate daily sales from BSR (Health & Household category formula)
  const estimateDailySales = (rank) => {
    if (!rank || rank <= 0) return null;
    // Approximate formula for Health & Household on Amazon US
    if (rank <= 5) return Math.round(300 + (5 - rank) * 100);
    if (rank <= 50) return Math.round(200 * Math.pow(rank / 5, -0.6));
    if (rank <= 500) return Math.round(80 * Math.pow(rank / 50, -0.5));
    if (rank <= 5000) return Math.round(25 * Math.pow(rank / 500, -0.45));
    if (rank <= 50000) return Math.round(8 * Math.pow(rank / 5000, -0.4));
    return Math.max(1, Math.round(3 * Math.pow(rank / 50000, -0.35)));
  };

  const ProductCard = ({ product, onClick }) => {
    const title = getTitle(product.summaries);
    const brand = getBrand(product.attributes);
    const rank = getRank(product.salesRanks);
    const image = getImage(product.images);
    const price = formatPrice(product.attributes);
    return (

        borderRadius: 12, padding: 16, cursor: "pointer", transition: "all 0.2s",

      }}
        onMouseEnter={e => { e.currentTarget.style.background = "#f8fafc"; e.currentTarget.style.boxShadow = "0 4px 12px rgba(0,0,0,0.1)"; }}
        onMouseLeave={e => { e.currentTarget.style.background = "#fff"; e.currentTarget.style.boxShadow = "0 1px 3px rgba(0,0,0,0.05)"; }}
      >

          <div style={{ width: "100%", height: 140, borderRadius: 8, overflow: "hidden", background: "#f8fafc", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <img src={image} alt={title} style={{ width: "100%", height: "100%", objectFit: "contain" }} />
          </div>
        )}
        <div>
          <div style={{ fontSize: 11, color: "#10b981", fontWeight: 700, marginBottom: 4, textTransform: "uppercase", letterSpacing: 1 }}>{brand}</div>
          <div style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.4, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{title}</div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "auto" }}>
          <span style={{ fontSize: 15, fontWeight: 700, color: "#0f172a" }}>{price}</span>
          {rank && <span style={{ fontSize: 11, color: "#64748b", background: "#f1f5f9", padding: "2px 8px", borderRadius: 10 }}>#{rank.toLocaleString()}</span>}
        </div>
        <div style={{ fontSize: 11, color: "#94a3b8" }}>ASIN: {product.asin}</div>
      </div>
    );
  };

  const ProductModal = ({ product, onClose }) => {
    if (!product) return null;
    const title = getTitle(product.summaries);
    const brand = getBrand(product.attributes);
    const image = getImage(product.images);
    const price = formatPrice(product.attributes);
    const rank = getRank(product.salesRanks);
    const bullets = product.attributes?.bullet_point?.slice(0, 5) || [];
    const form = extractForm(title);
    return (

        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>

            <div style={{ width: "100%", height: 220, borderRadius: 12, overflow: "hidden", background: "#f8fafc", marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>

            <div style={{ background: "#ecfdf5", border: "1px solid #a7f3d0", borderRadius: 10, padding: "10px 16px", flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#059669" }}>{price}</div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>List Price</div>

            {rank && (

      {apiStatus?.mode === "live" ? "LIVE" : apiStatus?.mode?.toUpperCase() || "CONNECTING..."}
      {lastUpdated && (

  // Countdown to next refresh
  const [nextRefreshIn, setNextRefreshIn] = useState(30 * 60);
  useEffect(() => {
    const timer = setInterval(() => {
      setNextRefreshIn(prev => {
        if (prev <= 1) return 30 * 60;
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, []);
  useEffect(() => { setNextRefreshIn(30 * 60); }, [lastUpdated]);

  // Compute form analysis from all products
  const computeFormAnalysis = (catEntries) => {
    const formCounts = {};
    const formRevenue = {};
    catEntries.forEach(([catId, c]) => {
      (c.topProducts || []).forEach(p => {
        const form = extractForm(p.title);
        if (!formCounts[form]) { formCounts[form] = 0; formRevenue[form] = 0; }
        formCounts[form]++;
        const dailySales = estimateDailySales(p.rank) || 0;
        formRevenue[form] += (p.price || 0) * dailySales * 30;
      });
    });
    return Object.entries(formCounts)
      .map(([form, count]) => ({ form, count, revenue: formRevenue[form] || 0 }))
      .sort((a, b) => b.count - a.count);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#f8fafc", color: "#1e293b", fontFamily: "'DM Sans', system-ui, sans-serif" }}>
      {/* Header */}
      <div style={{ borderBottom: "1px solid #e2e8f0", padding: "16px 32px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, background: "rgba(255,255,255,0.95)", backdropFilter: "blur(20px)", zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 36, height: 36, background: "linear-gradient(135deg, #10b981, #3b82f6)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{"\u{1F33F}"}</div>
          <div>

        </div>

          <button onClick={() => { setTrends(null); setTimeout(() => loadTrends(true), 100); }} disabled={trendsLoading} style={{

            padding: "7px 14px", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12,

          }}>{trendsLoading ? "..." : "\u{1F504} Refresh"}</button>

      </div>

      {/* Nav */}
      <div style={{ padding: "0 32px", borderBottom: "1px solid #e2e8f0", display: "flex", gap: 4, background: "#fff" }}>
        {[["dashboard", "\u{1F4CA} Dashboard"], ["browse", "\u{1F50D} Browse & Search"]].map(([id, label]) => (
          <button key={id} onClick={() => setActiveTab(id)} style={{
            background: "none", border: "none", cursor: "pointer", padding: "14px 16px",
            fontSize: 13, fontWeight: 600, color: activeTab === id ? "#10b981" : "#64748b",
            borderBottom: `2px solid ${activeTab === id ? "#10b981" : "transparent"}`,
            transition: "all 0.2s"
          }}>{label}</button>
        ))}
      </div>

      <div style={{ padding: 32 }}>
        {/* DASHBOARD TAB */}
        {activeTab === "dashboard" && (
          <div>
            <div style={{ marginBottom: 24 }}>
              <h1 style={{ fontSize: 28, fontWeight: 700, color: "#0f172a", marginBottom: 8 }}>Trend Analysis Dashboard</h1>
              <p style={{ color: "#64748b" }}>Amazon US Dietary Supplement Market Intelligence</p>
            </div>

            {/* Keyword Filter removed - now integrated into Top 100 category filter */}

            {trendsLoading && !trends ? <CategoryLoadingSpinner />
            : trends ? (() => {
              const cats = trends.categories || {};
              let catEntries = Object.entries(cats);
              // Apply keyword filter
              if (keywordFilter.trim()) {
                const kw = keywordFilter.toLowerCase();
                catEntries = catEntries.filter(([catId, c]) => {
                  const cat = CATEGORIES.find(ct => ct.id === catId);
                  if (cat?.name.toLowerCase().includes(kw) || catId.toLowerCase().includes(kw)) return true;
                  return (c.topProducts || []).some(p => p.title?.toLowerCase().includes(kw) || p.brand?.toLowerCase().includes(kw));
                });
              }
              const totalProducts = catEntries.reduce((sum, [, c]) => sum + c.totalProducts, 0);
              const allBrands = new Set();
              catEntries.forEach(([, c]) => Object.keys(c.brands).forEach(b => allBrands.add(b)));
              const overallAvgPrice = catEntries.length ? +(catEntries.reduce((sum, [, c]) => sum + c.avgPrice, 0) / catEntries.length).toFixed(2) : 0;
              const topAll = catEntries.flatMap(([catId, c]) => c.topProducts.map(p => ({ ...p, category: catId }))).sort((a, b) => a.rank - b.rank).slice(0, 100);
              const brandRevenues = {};
              catEntries.forEach(([, c]) => Object.entries(c.brands).forEach(([b, data]) => {
                if (!brandRevenues[b]) brandRevenues[b] = { count: 0, revenue: 0 };
                brandRevenues[b].count += data.count;
                brandRevenues[b].revenue += data.revenue;
              }));
              const topBrands = Object.entries(brandRevenues).sort((a, b) => b[1].revenue - a[1].revenue).slice(0, 10);
              const formAnalysis = computeFormAnalysis(catEntries);
              const totalDist = { under10: 0, '10to20': 0, '20to30': 0, '30to50': 0, over50: 0 };
              catEntries.forEach(([, c]) => { Object.entries(c.priceDistribution).forEach(([k, v]) => { totalDist[k] += v; }); });
              const maxDist = Math.max(...Object.values(totalDist), 1);
              const COLORS = ["#10b981", "#6366f1", "#f59e0b", "#ec4899", "#0ea5e9", "#f97316", "#8b5cf6", "#14b8a6"];

              // --- NPD Insights computations ---
              const maxRev = Math.max(...catEntries.map(([,c]) => c.estimatedMonthlyRevenue || 0), 1);
              const maxSpread = Math.max(...catEntries.map(([,c]) => c.priceSpread || 0), 1);
              const scoredCats = catEntries.map(([catId, c]) => {
                const demandScore = c.avgRank > 0 ? Math.max(0, 100 - Math.log10(c.avgRank) * 20) : 0;
                const compScore = c.hhi ? Math.max(0, 100 - (c.hhi / 100)) : 50;
                const priceScore = maxSpread > 0 ? ((c.priceSpread || 0) / maxSpread) * 100 : 0;
                const revenueScore = maxRev > 0 ? ((c.estimatedMonthlyRevenue || 0) / maxRev) * 100 : 0;
                const opportunity = Math.round(demandScore * 0.3 + compScore * 0.25 + priceScore * 0.2 + revenueScore * 0.25);
                return { catId, c, opportunity };
              });
              const npdCategories = [...scoredCats].sort((a, b) => b.opportunity - a.opportunity).slice(0, 3);
              const hotCategories = [...catEntries].sort((a, b) => (b[1].avgDailySales || 0) - (a[1].avgDailySales || 0)).slice(0, 3);

              // Product card helper for recommendation sections
              const MiniProductCard = ({ p, badge, badgeColor }) => {

                const est = estimateDailySales(p.rank);
                return (
                  <div onClick={() => setSelectedProduct({

                        {est && <span style={{ fontSize: 10, color: "#2563eb", background: "#eff6ff", padding: "1px 6px", borderRadius: 8 }}>~{est}/day</span>}
                        {badge && <span style={{ fontSize: 10, color: badgeColor || "#6366f1", background: `${badgeColor || "#6366f1"}15`, padding: "1px 6px", borderRadius: 8, fontWeight: 600 }}>{badge}</span>}
                      </div>
                    </div>
                  </div>
                );
              };

              return (
                <div>
                  {/* NPD Insight Cards - Simplified Vertical Layout */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: 36 }}>
                    {/* Best Sellers Top 3 */}
                    <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: "14px 18px", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                        <span style={{ fontSize: 16 }}>{"\u{1F3C6}"}</span>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "#0f172a" }}>Best Sellers Top 3</span>
                      </div>
                      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                        {topAll.slice(0, 3).map((p, i) => (
                          <div key={p.asin} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: "#f8fafc", borderRadius: 8, border: "1px solid #e2e8f0", flex: "1 1 200px", minWidth: 0, cursor: "pointer" }} onClick={() => setSelectedProduct(p)}>
                            {p.image && <img src={p.image} alt="" style={{ width: 36, height: 36, objectFit: "contain", borderRadius: 4 }} />}
                            <div style={{ flex: 1, minWidth: 0 }}>

                              <div style={{ fontSize: 11, color: "#64748b" }}>{p.price ? `$${p.price.toFixed(2)}` : ""} {p.rank ? `#${p.rank.toLocaleString()}` : ""}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* NPD Opportunity Top 3 */}
                    <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: "14px 18px", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                        <span style={{ fontSize: 16 }}>{"\u{1F4A1}"}</span>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "#0f172a" }}>NPD Opportunity Top 3</span>
                        <span style={{ fontSize: 11, color: "#64748b" }}>Low competition + high demand</span>
                      </div>
                      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>

                          const cat = CATEGORIES.find(ct => ct.id === catId);

                          return (
                            <div key={catId} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 10px", background: i === 0 ? "#f0fdf4" : "#f8fafc", borderRadius: 8, border: "1px solid #e2e8f0", flex: "1 1 200px", minWidth: 0 }}>

                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Hot Categories Top 3 */}
                    <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: "14px 18px", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                        <span style={{ fontSize: 16 }}>{"\u{1F525}"}</span>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "#0f172a" }}>Hot Right Now</span>
                        <span style={{ fontSize: 11, color: "#64748b" }}>Highest avg daily sales</span>
                      </div>
                      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                        {hotCategories.map(([catId, c], i) => {
                          const cat = CATEGORIES.find(ct => ct.id === catId);
                          return (
                            <div key={catId} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 10px", background: i === 0 ? "#fff7ed" : "#f8fafc", borderRadius: 8, border: "1px solid #e2e8f0", flex: "1 1 200px", minWidth: 0 }}>
                              <span style={{ fontSize: 22 }}>{cat?.icon}</span>

                  <div style={{ marginBottom: 16, padding: "12px 0", borderBottom: "2px solid #f59e0b" }}>
                    <h2 style={{ fontSize: 20, fontWeight: 700, color: "#0f172a" }}>Section C: Opportunity Finder</h2>
                    <p style={{ fontSize: 12, color: "#64748b" }}>Gap markets, opportunity scores, trending insights</p>
                  </div>

                  {/* Competition Analysis with expandable products */}
                  <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 14, padding: 24, marginBottom: 36, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
                    <h3 style={{ fontSize: 15, fontWeight: 700, color: "#0f172a", marginBottom: 4 }}>Competition Analysis</h3>
                    <p style={{ fontSize: 11, color: "#64748b", marginBottom: 16 }}>Brand concentration & market entry difficulty - click a row to see products</p>
                    <div style={{ maxHeight: 500, overflowY: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse" }}>
                        <thead><tr style={{ borderBottom: "1px solid #e2e8f0" }}>
                          {["", "Category", "Brands", "HHI", "Top Brand", "Share"].map(h => (
                            <th key={h} style={{ padding: "8px 10px", textAlign: "left", color: "#64748b", fontWeight: 600, fontSize: 11, textTransform: "uppercase", position: "sticky", top: 0, background: "#fff" }}>{h}</th>
                          ))}
                        </tr></thead>
                        <tbody>
                          {[...catEntries].filter(([, c]) => c.brandCount > 0 || Object.keys(c.brands || {}).length > 0).sort((a, b) => (a[1].hhi || 0) - (b[1].hhi || 0)).map(([catId, c]) => {
                            const cat = CATEGORIES.find(ct => ct.id === catId);
                            const hhiVal = c.hhi || 0;
                            const hhiColor = hhiVal < 1500 ? "#10b981" : hhiVal < 2500 ? "#f59e0b" : "#ef4444";
                            const hhiLabel = hhiVal < 1500 ? "Low" : hhiVal < 2500 ? "Mid" : "High";
                            const isExpanded = expandedCompetition === catId;
                            return React.createElement(React.Fragment, { key: catId },
                              <tr style={{ borderBottom: "1px solid #f1f5f9", cursor: "pointer", background: isExpanded ? "#f0fdf4" : "transparent" }}
                                onClick={() => setExpandedCompetition(isExpanded ? null : catId)}
                                onMouseEnter={e => { if (!isExpanded) e.currentTarget.style.background = "#f8fafc"; }}
                                onMouseLeave={e => { if (!isExpanded) e.currentTarget.style.background = "transparent"; }}>
                                <td style={{ padding: "8px 10px", color: "#94a3b8", fontSize: 12 }}>{isExpanded ? "\u25BC" : "\u25B6"}</td>
                                <td style={{ padding: "8px 10px", color: "#0f172a", fontWeight: 600, fontSize: 12 }}>{cat?.icon} {cat?.name || catId}</td>
                                <td style={{ padding: "8px 10px", color: "#64748b", fontSize: 13 }}>{c.brandCount || Object.keys(c.brands).length}</td>
                                <td style={{ padding: "8px 10px" }}>
                                  <span style={{ color: hhiColor, fontWeight: 600, fontSize: 12 }}>{hhiVal.toLocaleString()}</span>
                                  <span style={{ color: hhiColor, fontSize: 10, marginLeft: 4, opacity: 0.7 }}>({hhiLabel})</span>
                                </td>
                                <td style={{ padding: "8px 10px", color: "#0f172a", fontSize: 12 }}>{c.topBrand || 'N/A'}</td>
                                <td style={{ padding: "8px 10px", color: "#6366f1", fontWeight: 600, fontSize: 13 }}>{c.topBrandShare || 0}%</td>
                              </tr>,
                              isExpanded && (c.topProducts || []).slice(0, 10).map((prod, pi) => (
                                <tr key={`${catId}-${pi}`} style={{ background: "#f0fdf4", borderBottom: "1px solid #e2e8f0" }}>
                                  <td style={{ padding: "6px 10px" }}></td>
                                  <td colSpan={3} style={{ padding: "6px 10px", fontSize: 12, color: "#334155" }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                      {prod.image && <img src={prod.image} alt="" style={{ width: 28, height: 28, borderRadius: 4, objectFit: "contain", background: "#fff" }} />}
                                      <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 300 }}>{prod.title}</span>
                                    </div>
                                  </td>
                                  <td style={{ padding: "6px 10px", fontSize: 12, color: "#64748b" }}>{prod.brand}</td>
                                  <td style={{ padding: "6px 10px", fontSize: 12 }}>
                                    <span style={{ color: "#10b981", fontWeight: 600 }}>#{prod.rank?.toLocaleString()}</span>
                                    {prod.price && <span style={{ color: "#64748b", marginLeft: 8 }}>${prod.price.toFixed(2)}</span>}
                                  </td>
                                </tr>
                              ))
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Market Opportunity Score */}
                  <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 14, padding: 24, marginBottom: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
                    <h3 style={{ fontSize: 15, fontWeight: 700, color: "#0f172a", marginBottom: 4 }}>Market Opportunity Score</h3>
                    <p style={{ fontSize: 11, color: "#64748b", marginBottom: 16 }}>High demand + Low competition + Price room = High opportunity</p>
                    <div style={{ maxHeight: 400, overflowY: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse" }}>
                        <thead><tr style={{ borderBottom: "1px solid #e2e8f0" }}>
                          {["#", "Category", "Opportunity", "Demand", "Competition", "Price Room", "Revenue"].map(h => (
                            <th key={h} style={{ padding: "8px 10px", textAlign: h === "#" ? "center" : "left", color: "#64748b", fontWeight: 600, fontSize: 11, textTransform: "uppercase", position: "sticky", top: 0, background: "#fff" }}>{h}</th>
                          ))}
                        </tr></thead>
                        <tbody>
                          {(() => {
                            const maxRev = Math.max(...catEntries.map(([,c]) => c.estimatedMonthlyRevenue || 0), 1);
                            const maxSpread = Math.max(...catEntries.map(([,c]) => c.priceSpread || 0), 1);
                            const scored = catEntries.map(([catId, c]) => {
                              const demandScore = c.avgRank > 0 ? Math.max(0, 100 - Math.log10(c.avgRank) * 20) : 0;
                              const compScore = c.hhi ? Math.max(0, 100 - (c.hhi / 100)) : 50;
                              const priceScore = maxSpread > 0 ? ((c.priceSpread || 0) / maxSpread) * 100 : 0;
                              const revenueScore = maxRev > 0 ? ((c.estimatedMonthlyRevenue || 0) / maxRev) * 100 : 0;
                              const opportunity = Math.round(demandScore * 0.3 + compScore * 0.25 + priceScore * 0.2 + revenueScore * 0.25);
                              return { catId, c, demandScore: Math.round(demandScore), compScore: Math.round(compScore), priceScore: Math.round(priceScore), revenueScore: Math.round(revenueScore), opportunity };
                            }).sort((a, b) => b.opportunity - a.opportunity);
                            return scored.map(({ catId, demandScore, compScore, priceScore, revenueScore, opportunity }, i) => {
                              const cat = CATEGORIES.find(ct => ct.id === catId);
                              const oppColor = opportunity >= 70 ? "#10b981" : opportunity >= 50 ? "#f59e0b" : "#ef4444";
                              return (
                                <tr key={catId} style={{ borderBottom: "1px solid #f1f5f9" }}>
                                  <td style={{ padding: "8px 10px", textAlign: "center", color: i < 3 ? "#d97706" : "#94a3b8", fontWeight: 700, fontSize: 13 }}>{i + 1}</td>
                                  <td style={{ padding: "8px 10px", color: "#0f172a", fontSize: 13 }}>{cat?.icon} {cat?.name || catId}</td>
                                  <td style={{ padding: "8px 10px" }}>
                                    <span style={{ background: `${oppColor}18`, border: `1px solid ${oppColor}44`, borderRadius: 6, padding: "3px 8px", color: oppColor, fontWeight: 700, fontSize: 13 }}>{opportunity}</span>
                                  </td>
                                  <td style={{ padding: "8px 10px", color: "#0ea5e9", fontSize: 12 }}>{demandScore}</td>
                                  <td style={{ padding: "8px 10px", color: "#8b5cf6", fontSize: 12 }}>{compScore}</td>
                                  <td style={{ padding: "8px 10px", color: "#f59e0b", fontSize: 12 }}>{priceScore}</td>
                                  <td style={{ padding: "8px 10px", color: "#10b981", fontSize: 12 }}>{revenueScore}</td>
                                </tr>
                              );
                            });
                          })()}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Trend Hashtags Rolling Banner */}
                  <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 14, padding: "14px 24px", marginBottom: 36, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#0f172a" }}>Trending Now</span>
                      <span style={{ fontSize: 11, color: "#64748b" }}>Popular supplement trends & hashtags</span>
                    </div>
                    <div style={{ overflow: "hidden", position: "relative" }}>
                      <div style={{ display: "flex", gap: 12, animation: "scrollTags 30s linear infinite", width: "max-content" }}>
                        {[...TREND_HASHTAGS, ...TREND_HASHTAGS].map((tag, i) => (
                          <span key={i} style={{
                            background: i % 5 === 0 ? "#ecfdf5" : i % 5 === 1 ? "#eff6ff" : i % 5 === 2 ? "#fef3c7" : i % 5 === 3 ? "#fdf2f8" : "#f5f3ff",
                            color: i % 5 === 0 ? "#059669" : i % 5 === 1 ? "#2563eb" : i % 5 === 2 ? "#d97706" : i % 5 === 3 ? "#db2777" : "#7c3aed",
                            padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 600, whiteSpace: "nowrap",
                            border: `1px solid ${i % 5 === 0 ? "#a7f3d0" : i % 5 === 1 ? "#bfdbfe" : i % 5 === 2 ? "#fde68a" : i % 5 === 3 ? "#fbcfe8" : "#ddd6fe"}`
                          }}>{tag}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })() : (
              <div style={{ textAlign: "center", padding: 60, color: "#94a3b8" }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>{"\u{1F4CA}"}</div>
                <p>Click "Refresh" to load trend analysis</p>
              </div>
            )}
          </div>
        )}

        {/* BROWSE & SEARCH TAB */}
        {activeTab === "browse" && (
          <div>
            {/* Search bar */}
            <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
              <input
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleSearch()}
                placeholder="Search supplements... (e.g. vitamin c, protein, NOW Foods)"
                style={{
                  flex: 1, background: "#fff", border: "1px solid #e2e8f0",
                  borderRadius: 10, padding: "12px 16px", color: "#1e293b", fontSize: 14, outline: "none"
                }}
              />
              <button onClick={handleSearch} style={{
                background: "linear-gradient(135deg, #10b981, #3b82f6)", border: "none",
                borderRadius: 10, padding: "12px 24px", color: "#fff", fontWeight: 700,
                cursor: "pointer", fontSize: 14
              }}>Search</button>
            </div>

            {/* Search Results */}
            {searchResults.length > 0 && (
              <div style={{ marginBottom: 28 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                  <h2 style={{ fontSize: 18, fontWeight: 700, color: "#0f172a" }}>Search Results ({searchResults.length})</h2>
                  <button onClick={() => setSearchResults([])} style={{ background: "#f1f5f9", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 12px", color: "#64748b", cursor: "pointer", fontSize: 12 }}>Clear</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 16 }}>
                  {searchResults.map(p => <ProductCard key={p.asin} product={p} onClick={setSelectedProduct} />)}
                </div>
                <div style={{ borderBottom: "1px solid #e2e8f0", margin: "28px 0" }} />
              </div>
            )}

            {/* Category header */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
              <div>
                <h1 style={{ fontSize: 24, fontWeight: 700, color: "#0f172a" }}>
                  {CATEGORIES.find(c => c.id === activeCategory)?.icon} {CATEGORIES.find(c => c.id === activeCategory)?.name}
                </h1>
                {stats.total > 0 && <p style={{ color: "#64748b", fontSize: 13, marginTop: 4 }}>{stats.total.toLocaleString()} products &middot; {stats.brands} brands</p>}
              </div>
            </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 28, flexWrap: "wrap" }}>
              {CATEGORIES.map(cat => (
                <button key={cat.id} onClick={() => setActiveCategory(cat.id)} style={{
                  background: activeCategory === cat.id ? "#ecfdf5" : "#fff",
                  border: `1px solid ${activeCategory === cat.id ? "#a7f3d0" : "#e2e8f0"}`,
                  borderRadius: 20, padding: "6px 14px", cursor: "pointer",
                  fontSize: 12, fontWeight: 600,
                  color: activeCategory === cat.id ? "#059669" : "#64748b",
                  transition: "all 0.2s"
                }}>{cat.icon} {cat.name}</button>
              ))}
            </div>

            {loading ? (
              <div style={{ textAlign: "center", padding: 80 }}>
                <div style={{ width: 40, height: 40, border: "3px solid rgba(16,185,129,0.2)", borderTopColor: "#10b981", borderRadius: "50%", animation: "spin 1s linear infinite", margin: "0 auto 16px" }} />
                <div style={{ color: "#64748b" }}>Loading products...</div>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 16 }}>
                {products.map(p => <ProductCard key={p.asin} product={p} onClick={setSelectedProduct} />)}
                {products.length === 0 && <div style={{ color: "#94a3b8", gridColumn: "1/-1", textAlign: "center", padding: 60 }}>No products found</div>}
              </div>
            )}
          </div>
        )}
      </div>

      <ProductModal product={selectedProduct} onClose={() => setSelectedProduct(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VitaView />);
</script>
</body>
</html>
